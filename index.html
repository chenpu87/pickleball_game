<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Pickleball × Love x Taiwan </title>
<link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Pacifico&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html{height:100%}
body{
  background:#0d0d1a;
  display:flex;flex-direction:column;align-items:center;
  min-height:100vh;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  padding:0;overflow-x:hidden;
}
#app{width:100%;max-width:900px;padding:12px 12px 20px;display:flex;flex-direction:column;gap:8px;align-items:center;}
#scoreboard{
  display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:10px;
  padding:12px 20px;background:#1e1e2e;
  border:1px solid rgba(255,255,255,0.1);border-radius:14px;
  width:100%;
}
.side-label{font-size:11px;color:#888;font-weight:500;letter-spacing:.04em}
.pts{font-size:34px;font-weight:600;color:#fff;line-height:1}
.games-row{display:flex;gap:4px;margin-top:4px}
.gdot{width:9px;height:9px;border-radius:50%;background:rgba(255,255,255,0.15)}
.gdot.won{background:#7ac522}
#center-info{text-align:center}
#smsg{font-size:13px;font-weight:500;color:#fff;min-height:17px}
#sbadge{font-size:10px;color:#aaa;margin-top:3px;min-height:14px}
.svtag{font-size:10px;background:#FAC775;color:#412402;padding:1px 7px;border-radius:4px;display:inline-block}
.smashtag{font-size:10px;background:#EF4444;color:#fff;padding:1px 7px;border-radius:4px;display:inline-block;animation:blink .3s infinite alternate}
@keyframes blink{from{opacity:1}to{opacity:.1}}
#cw{position:relative;width:100%;display:flex;justify-content:center;align-items:center;gap:8px;}
#side-left,#side-right{
  flex:0 0 65px;display:flex;align-items:center;justify-content:center;
  min-height:200px;padding:8px 2px;
}
#side-left .graffiti{
  font-family:'Permanent Marker',cursive;
  font-size:clamp(18px,3.5vw,28px);
  color:#FFCD00;
  text-shadow:2px 2px 0 #c0312b, 0 0 14px rgba(255,200,0,0.6);
  line-height:1.6;
  text-align:center;
  white-space:nowrap;
}
#side-right .graffiti{
  font-family:'Pacifico',cursive;
  font-size:clamp(13px,2.2vw,20px);
  color:#00d4ff;
  text-shadow:2px 2px 0 #0d4a7a, 0 0 14px rgba(0,200,255,0.6);
  line-height:1.6;
  text-align:center;
  white-space:nowrap;
}
canvas{display:block;touch-action:none;cursor:crosshair;}
#cbar{
  display:flex;align-items:center;gap:10px;padding:9px 14px;
  background:#1e1e2e;border:1px solid rgba(255,255,255,0.1);
  border-radius:14px;flex-wrap:wrap;
  margin-top:20mm;width:100%;
}
button{font-size:12px;padding:6px 14px;border-radius:8px;border:1px solid rgba(255,255,255,0.22);background:rgba(255,255,255,0.09);color:#fff;cursor:pointer;white-space:nowrap}
button:hover{background:rgba(255,255,255,0.16)}
button:active{transform:scale(.97)}
select{font-size:12px;padding:6px 9px;border-radius:8px;border:1px solid rgba(255,255,255,0.22);background:rgba(255,255,255,0.09);color:#fff;cursor:pointer}
select option{background:#222}
#tip{font-size:11px;color:#555;margin-left:auto;text-align:right}

/* Log table */
#logw{padding:10px 14px;background:#161626;border-radius:10px;border:1px solid rgba(255,255,255,0.07);width:100%;}
#logtitle{font-size:11px;font-weight:500;color:#555;margin-bottom:6px;text-transform:uppercase;letter-spacing:.06em}
#log-table-wrap{overflow-x:auto}
#log-table{width:100%;border-collapse:collapse;font-size:12px}
#log-table th{font-size:10px;color:#555;font-weight:500;padding:3px 8px;border-bottom:1px solid rgba(255,255,255,0.07);text-align:left;white-space:nowrap}
#log-table td{padding:3px 8px;color:#888;border-bottom:1px solid rgba(255,255,255,0.04);white-space:nowrap}
#log-table tr:first-child td{color:#bbb}
.pt-you{color:#7ac522 !important;font-weight:500}
.pt-ai{color:#ef4444 !important;font-weight:500}
#log-table-wrap{max-height:110px;overflow-y:auto}
#log-table-wrap::-webkit-scrollbar{width:3px}
#log-table-wrap::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:2px}
#controls-hint{font-size:11px;color:#444;text-align:center;padding:4px 0 0}
@media(max-width:600px){
  #app{padding:0 0 16px}
  #scoreboard{padding:10px 12px}
  .pts{font-size:28px}
  #tip{display:none}
}
</style>
</head>
<body>
<div id="app">
<div id="scoreboard">
  <div class="side">
    <div class="side-label" data-i18n="ai-label">電腦 AI</div>
    <div class="pts" id="ai-pts">0</div>
    <div class="games-row" id="ai-games"></div>
  </div>
  <div id="center-info">
    <div id="smsg">按空白鍵開始</div>
    <div id="sbadge"></div>
  </div>
  <div class="side" style="text-align:right;align-items:flex-end;display:flex;flex-direction:column">
    <div class="side-label" data-i18n="you-label">你</div>
    <div class="pts" id="p-pts">0</div>
    <div class="games-row" id="p-games" style="justify-content:flex-end"></div>
  </div>
</div>
<div id="cw">
  <div id="side-left"><span class="graffiti">DINK<br>IT !!</span></div>
  <canvas id="gc"></canvas>
  <div id="side-right"><span class="graffiti">VOLLEY !!</span></div>
</div>
<div id="cbar">
  <button id="btnstart" data-i18n="start">開始 / 重來</button>
  <select id="diffsel">
    <option value="easy" data-i18n="easy">簡單</option>
    <option value="med" selected data-i18n="med">普通</option>
    <option value="hard" data-i18n="hard">困難</option>
  </select>
  <button id="btnlang" style="margin-left:auto;background:rgba(255,200,0,0.15);border-color:rgba(255,200,0,0.5);color:#FFCD00;font-weight:700;letter-spacing:0.05em;">🌐 EN</button>
  <span id="tip" data-i18n="tip">電腦：鍵盤按 "W" 前進到Kitchen 按"S"往後，用滑鼠左右移動 · 擊球後點擊 SMASH · 5分1局 · 2局勝</span>
</div>
<div id="logw">
  <div id="logtitle" data-i18n="logtitle">得分紀錄</div>
  <div id="log-table-wrap">
    <table id="log-table">
      <thead><tr><th>#</th><th id="th-score" data-i18n="th-score">得分</th><th id="th-set" data-i18n="th-set">局</th><th id="th-reason" data-i18n="th-reason">原因</th><th id="th-you" data-i18n="th-you">你</th><th>AI</th></tr></thead>
      <tbody id="log-body"></tbody>
    </table>
  </div>
</div>
<div id="controls-hint" data-i18n="hint">手機：滑動控制球拍前後左右 · 點擊發球 · 擊球後快速點兩下 = SMASH</div>
</div>
</div>

<script>

let lang='zh';
const i18n={
  zh:{
    'start':'開始 / 重來',
    'easy':'簡單','med':'普通','hard':'困難',
    'tip':'電腦：鍵盤按 "W" 前進到Kitchen 按"S"往後，用滑鼠左右移動 · 擊球後點擊 SMASH · 5分1局 · 2局勝',
    'hint':'手機：滑動控制球拍前後左右 · 點擊發球 · 擊球後快速點兩下 = SMASH',
    'logtitle':'得分紀錄',
    'th-score':'得分','th-set':'局','th-reason':'原因','th-you':'你',
    'ai-label':'電腦 AI','you-label':'你',
    'idle-msg':'按空白鍵開始',
    'serve-player':'空白鍵 / 點擊 發球','serve-ai':'AI 發球中...',
    'smash-hint':'擊球後點擊可 SMASH!',
    'win-you':'你贏了整場！','win-ai':'AI贏了整場',
    'set-win-you':'你贏得這局！','set-win-ai':'AI贏得這局',
    'you-serve':'你發球','ai-serve':'AI發球','set-label':'局',
    'net-you':'你打到網','net-ai':'AI打到網',
    'floor-ai':'落地底線失分','floor-you':'AI底線失分',
    'out-you':'出界','out-ai':'AI出界',
    'change-serve':'換發球 — ',
    'btnlang':'🌐 EN'
  },
  en:{
    'start':'Start / Restart',
    'easy':'Easy','med':'Normal','hard':'Hard',
    'tip':'PC: Press "W" to move forward to Kitchen, "S" to move back · Mouse left/right · After hit, click to SMASH · 5pts/set · Best of 2',
    'hint':'Mobile: Swipe to move paddle · Tap to serve · Double-tap after hit = SMASH',
    'logtitle':'Score Log',
    'th-score':'Point','th-set':'Set','th-reason':'Reason','th-you':'You',
    'ai-label':'Computer AI','you-label':'You',
    'idle-msg':'Press Space to Start',
    'serve-player':'Space / Tap to Serve','serve-ai':'AI Serving...',
    'smash-hint':'Tap now to SMASH!',
    'win-you':'You Win the Match!','win-ai':'AI Wins the Match',
    'set-win-you':'You won this set!','set-win-ai':'AI won this set',
    'you-serve':'Your Serve','ai-serve':'AI Serve','set-label':'Set',
    'net-you':'You hit the net','net-ai':'AI hit the net',
    'floor-ai':'Ball out — baseline','floor-you':'AI ball out — baseline',
    'out-you':'Out of bounds','out-ai':'AI out of bounds',
    'change-serve':'Side out — ',
    'btnlang':'🌐 中文'
  }
};

function t(key){return i18n[lang][key]||key;}

const cv=document.getElementById('gc');
const ct=cv.getContext('2d');
const cwrap=document.getElementById('cw');
const ASPECT=20/44;
const WIN_PTS=5, WIN_SETS=2;

function resize(){
  const sidePanels=65*2+8*2; // two 65px panels + gaps
  const avail=Math.min(window.innerWidth,900)-24-sidePanels;
  const maxCourtW=Math.min(avail, window.innerHeight*0.62*(20/44));
  cv.width=Math.max(maxCourtW,160)+30; // +30mm wider court
  cv.height=Math.round(cv.width/ASPECT);
}
resize();
window.addEventListener('resize',()=>{resize();if(!running)draw();});
const W=()=>cv.width,H=()=>cv.height;

function dm(){
  const w=W(),h=H(),mx=w*0.05,my=h*0.025;
  const cw=w-mx*2,ch=h-my*2,netY=my+ch/2,kitH=ch*(7/44);
  return{mx,my,cw,ch,netY,kitH,kitAiBot:my+kitH,kitPTop:h-my-kitH,w,h};
}
const PW=()=>Math.round(W()*0.35);
const PH=()=>Math.max(8,Math.round(H()*0.014));
const BR=()=>Math.max(6,Math.round(W()*0.04));

let running=false,animId=null;
let pScore=0,aiScore=0,pSets=0,aiSets=0;
let state='idle',serving='player';
let ball={},player={},ai={};
const keys={};
let mousePos={x:0,y:0};
let smashWindow=0,smashFlash=[];
let winAnim=0,winActive=false,winWho='';
let particles=[];
let rallyNum=0,setNum=1;
let logEntries=[];

document.addEventListener('keydown',e=>{
  keys[e.code]=true;
  if(e.code==='Space'){e.preventDefault();onSpace();}
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code))e.preventDefault();
});
document.addEventListener('keyup',e=>{keys[e.code]=false;});

function onSpace(){
  if(state==='serve'&&serving==='player')doServe();
  else if(state==='idle'||state==='between'||state==='gameover')startGame();
}
function doServe(){state='rally';setBadge('');}

function diffCfg(){
  const v=document.getElementById('diffsel').value;
  if(v==='easy')return{aiSpd:0.028,aiErr:0.22,baseSpd:0.013,drag:0.008};
  if(v==='hard')return{aiSpd:0.068,aiErr:0.03,baseSpd:0.022,drag:0.005};
  return{aiSpd:0.048,aiErr:0.11,baseSpd:0.017,drag:0.006};
}

function initGame(){
  const d=dm();
  pScore=0;aiScore=0;pSets=0;aiSets=0;rallyNum=0;setNum=1;
  logEntries=[];renderLog();
  winActive=false;
  serving=Math.random()<0.5?'player':'ai';
  player={x:d.mx+d.cw/2,y:d.netY+d.kitH-PH(),w:PW(),h:PH(),minY:d.netY+d.kitH-PH(),maxY:d.h-d.my-PH()};
  ai={x:d.mx+d.cw/2,y:d.netY-d.kitH,w:PW(),h:PH(),minY:d.my,maxY:d.netY-d.kitH};
  particles=[];resetBall();state='serve';updateUI();
}

function resetBall(){
  const cfg=diffCfg(),spd=cfg.baseSpd*W();
  const ang=(28+Math.random()*28)*Math.PI/180,sx=Math.random()<0.5?1:-1;
  ball={r:BR(),trail:[],lastHit:serving==='player'?'player':'ai',dbBounced:0,dbDone:false,hitCooldown:0};
  if(serving==='player'){ball.x=player.x;ball.y=player.y-ball.r*3;ball.vx=spd*Math.cos(ang)*sx;ball.vy=-spd*Math.sin(ang)*1.2;}
  else{ball.x=ai.x;ball.y=ai.y+ball.r*3;ball.vx=spd*Math.cos(ang)*sx;ball.vy=spd*Math.sin(ang)*1.2;}
  smashWindow=0;
}

function setMsg(msg){document.getElementById('smsg').textContent=msg;}
function setBadge(t){document.getElementById('sbadge').innerHTML=t;}

function updateUI(){
  document.getElementById('p-pts').textContent=pScore;
  document.getElementById('ai-pts').textContent=aiScore;
  ['p','ai'].forEach(who=>{
    const el=document.getElementById(who+'-games');el.innerHTML='';
    const n=who==='p'?pSets:aiSets;
    for(let i=0;i<WIN_SETS;i++){const d2=document.createElement('div');d2.className='gdot'+(i<n?' won':'');el.appendChild(d2);}
  });
  if(!winActive)setBadge(`<span class="svtag">${serving==='player'?t('you-serve'):t('ai-serve')} · ${t('set-label')}${setNum}</span>`);
}

function renderLog(){
  const tbody=document.getElementById('log-body');
  tbody.innerHTML='';
  for(let i=0;i<logEntries.length;i++){
    const e=logEntries[i];
    const tr=document.createElement('tr');
    tr.innerHTML=`<td>${logEntries.length-i}</td><td class="${e.who==='player'?'pt-you':'pt-ai'}">${e.who==='player'?t('th-you'):'AI'}</td><td>${e.set}</td><td>${e.reason}</td><td class="pt-you">${e.pScore}</td><td class="pt-ai">${e.aiScore}</td>`;
    tbody.appendChild(tr);
  }
  const w=document.getElementById('log-table-wrap');
  w.scrollTop=0;
}

function addLog(who,reason){
  rallyNum++;
  logEntries.unshift({num:rallyNum,who,reason,set:setNum,pScore,aiScore});
  renderLog();
}

function awardPt(winner,reason){
  // winner = 得分方（對手失誤）
  // 規則：只有發球方可得分；非發球方得分 → 換發球，不加分
  if(winner===serving){
    if(winner==='player')pScore++;else aiScore++;
    addLog(winner,reason);
  }else{
    // 非發球方贏這球 → 換發球，不得分
    serving=winner;
    addLog(winner,t('change-serve')+reason);
  }
  updateUI();
  if(pScore>=WIN_PTS&&pScore-aiScore>=2){
    pSets++;pScore=0;aiScore=0;setNum++;
    if(pSets>=WIN_SETS){triggerWin('player');return;}
    setMsg(t('set-win-you'));state='between';updateUI();
    setTimeout(()=>{resetBall();state='serve';updateUI();},1600);return;
  }
  if(aiScore>=WIN_PTS&&aiScore-pScore>=2){
    aiSets++;pScore=0;aiScore=0;setNum++;
    if(aiSets>=WIN_SETS){triggerWin('ai');return;}
    setMsg(t('set-win-ai'));state='between';updateUI();
    setTimeout(()=>{resetBall();state='serve';updateUI();},1600);return;
  }
  state='pause';smashWindow=0;
  setTimeout(()=>{resetBall();state='serve';updateUI();},650);
}

function triggerWin(who){
  winWho=who;winActive=true;winAnim=0;state='gameover';
  spawnConfetti(100);
  if(who==='player')setMsg(t('win-you'));else setMsg(t('win-ai'));
  updateUI();
}

function spawnConfetti(n){
  const cols=['#FF6B35','#F7931E','#FFCD00','#39B54A','#00AEEF','#8B5CF6','#EF4444','#fff','#ff69b4','#00ffcc'];
  for(let i=0;i<n;i++){
    particles.push({
      x:Math.random()*W(),y:-10-Math.random()*H()*0.3,
      vx:(Math.random()-0.5)*7,vy:2+Math.random()*5,
      color:cols[Math.floor(Math.random()*cols.length)],
      size:5+Math.random()*7,life:1,decay:0.006+Math.random()*0.006,
      rot:Math.random()*Math.PI*2,rotV:(Math.random()-0.5)*0.22
    });
  }
}

cv.addEventListener('mousemove',e=>{
  const r=cv.getBoundingClientRect();
  mousePos.x=(e.clientX-r.left)*(W()/r.width);
  mousePos.y=(e.clientY-r.top)*(H()/r.height);
});

// Touch: drag to move paddle in X and Y
let touchStartY=null, touchStartX=null, touchLastY=null, touchLastX=null;
let lastTapTime=0, doubleTapArmed=false;

cv.addEventListener('touchstart',e=>{
  e.preventDefault();
  const r=cv.getBoundingClientRect();
  const tx=(e.touches[0].clientX-r.left)*(W()/r.width);
  const ty=(e.touches[0].clientY-r.top)*(H()/r.height);
  touchStartX=tx; touchStartY=ty;
  touchLastX=tx;  touchLastY=ty;
  mousePos.x=tx;  mousePos.y=ty;

  if(state==='gameover'){startGame();return;}
  if(state==='serve'&&serving==='player'){doServe();return;}
  if(state==='idle'){startGame();return;}

  // Double-tap detection for SMASH
  const now=Date.now();
  if(now-lastTapTime<320&&smashWindow>0&&state==='rally'){
    doSmash(tx,ty);
    doubleTapArmed=false;
  } else {
    doubleTapArmed=true;
  }
  lastTapTime=now;
},{passive:false});

cv.addEventListener('touchmove',e=>{
  e.preventDefault();
  const r=cv.getBoundingClientRect();
  const tx=(e.touches[0].clientX-r.left)*(W()/r.width);
  const ty=(e.touches[0].clientY-r.top)*(H()/r.height);
  mousePos.x=tx; mousePos.y=ty;
  // Delta-based Y movement for paddle
  if(touchLastY!==null){
    const dy=ty-touchLastY;
    const d=dm();
    player.y=Math.max(player.minY,Math.min(player.maxY-player.h,player.y+dy));
  }
  touchLastX=tx; touchLastY=ty;
},{passive:false});

cv.addEventListener('touchend',()=>{
  touchLastY=null; touchLastX=null;
});

cv.addEventListener('click',e=>{
  const r=cv.getBoundingClientRect();
  const cx=(e.clientX-r.left)*(W()/r.width),cy=(e.clientY-r.top)*(H()/r.height);
  if(state==='gameover'){startGame();return;}
  if(state==='serve'&&serving==='player'){doServe();return;}
  if(state==='idle'){startGame();return;}
  if(smashWindow>0&&state==='rally')doSmash(cx,cy);
});

function doSmash(cx,cy){
  const dx=cx-ball.x,dy=cy-ball.y,dist=Math.sqrt(dx*dx+dy*dy)||1;
  const power=diffCfg().baseSpd*W()*3.0;
  ball.vx=(dx/dist)*power;ball.vy=(dy/dist)*power*0.85;
  if(ball.vy>0)ball.vy=-Math.abs(ball.vy);
  smashWindow=0;spawnSmashFlash(ball.x,ball.y);
  setBadge('<span class="smashtag">SMASH!</span>');
  setTimeout(()=>{if(document.getElementById('sbadge').innerHTML.includes('SMASH'))setBadge('');},700);
}
function spawnSmashFlash(x,y){
  smashFlash=[];
  for(let i=0;i<14;i++)smashFlash.push({x,y,a:i*(Math.PI*2/14),len:BR()*5,life:1});
}

document.getElementById('btnstart').addEventListener('click',startGame);
function startGame(){if(animId)cancelAnimationFrame(animId);running=true;initGame();loop();}
function loop(){if(!running)return;update();draw();animId=requestAnimationFrame(loop);}

function update(){
  const d=dm(),cfg=diffCfg(),pspd=H()*0.012;
  if(smashWindow>0)smashWindow--;
  if(winActive)winAnim++;
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx;p.y+=p.vy;p.vy+=0.12;p.rot+=p.rotV;p.life-=p.decay;
    if(p.life<=0||p.y>H()+20)particles.splice(i,1);
  }
  if(state==='gameover'){movePlayer(d,pspd);return;}
  if(state==='serve'){
    if(serving==='player'){ball.x=player.x;ball.y=player.y-ball.r*3;setMsg(t('serve-player'));}
    else{ball.x=ai.x;ball.y=ai.y+ball.r*3;setMsg(t('serve-ai'));
      setTimeout(()=>{if(state==='serve'&&serving==='ai')doServe();},900);}
    movePlayer(d,pspd);return;
  }
  if(state!=='rally')return;
  movePlayer(d,pspd);
  const aiHw=ai.w/2;
  const aiTgtX=ball.x+(Math.random()-0.5)*W()*cfg.aiErr;
  ai.x+=(Math.max(d.mx+aiHw,Math.min(d.mx+d.cw-aiHw,aiTgtX))-ai.x)*cfg.aiSpd*1.5;
  const aiTgtY=ball.vy<0?ball.y-ai.h*2:d.netY-d.kitH;
  ai.y+=(Math.max(ai.minY,Math.min(ai.maxY,aiTgtY))-ai.y)*cfg.aiSpd;
  ball.vx*=(1-cfg.drag);ball.vy*=(1-cfg.drag);
  ball.trail=ball.trail||[];ball.trail.push({x:ball.x,y:ball.y});if(ball.trail.length>8)ball.trail.shift();
  ball.x+=ball.vx;ball.y+=ball.vy;
  if(ball.hitCooldown>0)ball.hitCooldown--;
  if(ball.x-ball.r<d.mx){ball.x=d.mx+ball.r;ball.vx=Math.abs(ball.vx)*0.9;}
  if(ball.x+ball.r>d.mx+d.cw){ball.x=d.mx+d.cw-ball.r;ball.vx=-Math.abs(ball.vx)*0.9;}
  checkNet(d);if(state!=='rally')return;
  checkHit(d,player,true);if(state!=='rally')return;
  checkHit(d,ai,false);if(state!=='rally')return;
  checkFloor(d);
}

function checkNet(d){
  // 球打到網 → 打球方失誤，對方得分（若對方是發球方才得分，否則換發球）
  if(ball.vy>0&&ball.lastHit==='player'
     &&ball.y+ball.r>=d.netY&&ball.y-ball.r<d.netY+6){
    awardPt('ai',t('net-you'));
  }
  if(ball.vy<0&&ball.lastHit==='ai'
     &&ball.y-ball.r<=d.netY&&ball.y+ball.r>d.netY-6){
    awardPt('player',t('net-ai'));
  }
}
function checkHit(d,paddle,isPlayer){
  if(ball.hitCooldown>0)return;
  const ph=paddle.h,pw2=paddle.w/2,inX=ball.x>paddle.x-pw2&&ball.x<paddle.x+pw2;
  let hit=false;
  if(isPlayer&&ball.vy>0&&ball.y+ball.r>=paddle.y&&ball.y+ball.r<=paddle.y+ph+6&&inX)hit=true;
  if(!isPlayer&&ball.vy<0&&ball.y-ball.r<=paddle.y+ph&&ball.y-ball.r>=paddle.y-6&&inX)hit=true;
  if(!hit)return;
  const off=(ball.x-paddle.x)/pw2;
  const spd=Math.sqrt(ball.vx*ball.vx+ball.vy*ball.vy);
  const es=Math.max(spd,diffCfg().baseSpd*W()*0.75)*(1.05+Math.random()*0.1);
  const ang=(off*42+(Math.random()-0.5)*6)*Math.PI/180;
  if(isPlayer){
    ball.vy=-Math.abs(es*Math.cos(Math.abs(ang)*0.6));ball.vx=es*Math.sin(ang);
    ball.y=paddle.y-ball.r-1;ball.lastHit='player';smashWindow=24;
    setBadge(`<span style="font-size:10px;color:#FFCD00;font-weight:600">${t('smash-hint')}</span>`);
  }else{
    ball.vy=Math.abs(es*Math.cos(Math.abs(ang)*0.6));ball.vx=es*Math.sin(ang);
    ball.y=paddle.y+ph+ball.r+1;ball.lastHit='ai';smashWindow=0;
  }
  ball.hitCooldown=6;
}
function checkFloor(d){
  // 球碰到你方底線 → AI得分（你沒接到）
  if(ball.vy>0&&ball.y+ball.r>=d.h-d.my){
    awardPt('ai',t('floor-ai'));return;
  }
  // 球碰到AI方底線 → 你得分（AI沒接到）
  if(ball.vy<0&&ball.y-ball.r<=d.my){
    awardPt('player',t('floor-you'));return;
  }
  // 球飛出畫面外（保險）
  if(ball.y-ball.r>H()+40){awardPt('ai',t('out-you'));return;}
  if(ball.y+ball.r<-40){awardPt('player',t('out-ai'));return;}
}
function movePlayer(d,spd){
  const hw=player.w/2;
  if((keys['ArrowLeft']||keys['KeyA'])&&player.x-hw>d.mx)player.x-=spd;
  if((keys['ArrowRight']||keys['KeyD'])&&player.x+hw<d.mx+d.cw)player.x+=spd;
  if((keys['ArrowUp']||keys['KeyW'])&&player.y>player.minY){player.y-=spd*1.4;if(player.y<player.minY)player.y=player.minY;}
  if((keys['ArrowDown']||keys['KeyS'])&&player.y+player.h<player.maxY){player.y+=spd*1.4;if(player.y+player.h>player.maxY)player.y=player.maxY-player.h;}
  // Mouse: follow X axis only
  if(mousePos.x){const tx=Math.max(d.mx+hw,Math.min(d.mx+d.cw-hw,mousePos.x));player.x+=(tx-player.x)*0.22;}
}

/* ========== DRAW ========== */
function draw(){
  const d=dm();
  ct.clearRect(0,0,W(),H());
  ct.fillStyle='#1a1a2e';ct.fillRect(0,0,W(),H());
  ct.fillStyle='#1e5fd4';ct.fillRect(d.mx,d.my,d.cw,d.ch);
  ct.fillStyle='#c0312b';ct.fillRect(d.mx,d.netY-d.kitH,d.cw,d.kitH*2);
  ct.strokeStyle='rgba(255,255,255,0.88)';ct.lineWidth=2;ct.strokeRect(d.mx,d.my,d.cw,d.ch);
  ct.beginPath();
  ct.moveTo(d.mx+d.cw/2,d.my);ct.lineTo(d.mx+d.cw/2,d.netY-d.kitH);
  ct.moveTo(d.mx+d.cw/2,d.netY+d.kitH);ct.lineTo(d.mx+d.cw/2,d.my+d.ch);
  ct.stroke();
  ct.strokeStyle='rgba(255,255,255,0.78)';ct.lineWidth=2;
  ct.beginPath();
  ct.moveTo(d.mx,d.netY-d.kitH);ct.lineTo(d.mx+d.cw,d.netY-d.kitH);
  ct.moveTo(d.mx,d.netY+d.kitH);ct.lineTo(d.mx+d.cw,d.netY+d.kitH);
  ct.stroke();
  ct.save();
  ct.strokeStyle='rgba(255,255,255,0.97)';ct.lineWidth=5;
  ct.beginPath();ct.moveTo(d.mx-6,d.netY);ct.lineTo(d.mx+d.cw+6,d.netY);ct.stroke();
  ct.lineWidth=1.5;ct.strokeStyle='rgba(200,200,200,0.4)';
  for(let i=0;i<=18;i++){const nx=d.mx+d.cw*i/18;ct.beginPath();ct.moveTo(nx,d.netY-7);ct.lineTo(nx,d.netY+7);ct.stroke();}
  ct.restore();
  const kfs=Math.max(12,Math.round(d.cw*0.14));
  ct.font=`bold italic ${kfs}px Georgia,serif`;ct.textAlign='center';ct.textBaseline='middle';ct.fillStyle='rgba(255,255,255,0.97)';
  ct.save();ct.translate(d.mx+d.cw/2,d.netY-d.kitH/2);ct.rotate(Math.PI);ct.fillText('Kitchen',0,0);ct.restore();
  ct.fillText('Kitchen',d.mx+d.cw/2,d.netY+d.kitH/2);

  if(smashWindow>0){
    const a=smashWindow/24;ct.save();
    ct.strokeStyle=`rgba(255,200,0,${a*0.5})`;ct.lineWidth=2.5;ct.setLineDash([5,4]);
    const tx2=Math.max(d.mx+player.w/2,Math.min(d.mx+d.cw-player.w/2,mousePos.x||player.x));
    const ty2=Math.max(d.my,Math.min(d.netY-4,mousePos.y||player.y));
    ct.beginPath();ct.moveTo(player.x,player.y);ct.lineTo(tx2,ty2);ct.stroke();ct.setLineDash([]);ct.restore();
  }
  for(const f of smashFlash){
    f.life-=0.10;if(f.life<=0)continue;
    ct.save();ct.strokeStyle=`rgba(255,230,0,${f.life})`;ct.lineWidth=2.5;
    ct.beginPath();ct.moveTo(f.x,f.y);ct.lineTo(f.x+Math.cos(f.a)*f.len*f.life,f.y+Math.sin(f.a)*f.len*f.life);ct.stroke();ct.restore();
  }
  drawPaddle(player,true);drawPaddle(ai,false);
  if(ball&&ball.r){
    for(let i=1;i<(ball.trail||[]).length;i++){
      ct.beginPath();ct.arc(ball.trail[i].x,ball.trail[i].y,ball.r*(i/ball.trail.length)*0.6,0,Math.PI*2);
      ct.fillStyle=`rgba(212,255,0,${(i/ball.trail.length)*0.32})`;ct.fill();
    }
    drawBall(ball.x,ball.y,ball.r);
  }
  for(const p of particles){
    ct.save();ct.globalAlpha=p.life;ct.translate(p.x,p.y);ct.rotate(p.rot);
    ct.fillStyle=p.color;ct.fillRect(-p.size/2,-p.size/4,p.size,p.size/2);ct.restore();
  }
  if(winActive)drawWinScreen(d);
}

/* ========== 8-BIT WIN SCREEN ========== */
function drawWinScreen(d){
  const t=winAnim;
  const isPlayer=winWho==='player';

  // Dark overlay
  const fade=Math.min(0.82,t/40*0.82);
  ct.fillStyle=`rgba(0,0,0,${fade})`;ct.fillRect(0,0,W(),H());

  const cx=W()/2,cy=H()/2;
  const bw=Math.min(d.cw*0.9,520),bh=Math.min(d.ch*0.78,320);
  const bx=cx-bw/2,by=cy-bh/2;

  // 8-bit pixel border box
  const pxS=Math.max(3,Math.round(W()*0.006));
  const borderCols=['#FF6B35','#F7931E','#FFCD00','#39B54A','#00AEEF','#8B5CF6','#EF4444'];
  const bcIdx=Math.floor(t/5)%borderCols.length;
  draw8BitBorder(bx,by,bw,bh,pxS,borderCols[bcIdx],borderCols[(bcIdx+1)%borderCols.length]);

  // Inner fill
  ct.fillStyle='#0d0d1a';ct.fillRect(bx+pxS*2,by+pxS*2,bw-pxS*4,bh-pxS*4);

  // LOVE PICKLEBALL 8-bit logo
  const lw=bw*0.78,lh=lw*0.22;
  const lx=cx-lw/2,ly=by+pxS*3+bh*0.06;
  draw8BitLogoBar(lx,ly,lw,lh,t,borderCols);

  if(isPlayer){
    // 8-bit "YOU WIN!" text
    const bitFs=Math.max(16,Math.round(bh*0.14));
    ct.save();
    ct.font=`900 ${bitFs}px 'Courier New',monospace`;ct.textAlign='center';ct.textBaseline='middle';
    // Pixel shadow
    const flashCol=borderCols[Math.floor(t*0.4)%borderCols.length];
    ct.fillStyle=flashCol;ct.fillText('YOU WIN!',cx+3,cy-bh*0.04+3);
    ct.fillStyle='#fff';ct.fillText('YOU WIN!',cx,cy-bh*0.04);
    ct.restore();

    // Cursive "you win !" using canvas path art
    drawCursiveYouWin(cx,by+bh*0.62,bw*0.55,t);
  } else {
    const bitFs=Math.max(16,Math.round(bh*0.14));
    ct.save();ct.font=`900 ${bitFs}px 'Courier New',monospace`;ct.textAlign='center';ct.textBaseline='middle';
    ct.fillStyle='#ef4444';ct.fillText('AI WIN!',cx+2,cy-bh*0.04+2);
    ct.fillStyle='#fff';ct.fillText('AI WIN!',cx,cy-bh*0.04);
    ct.restore();
  }

  // Score summary
  const sfs=Math.max(11,Math.round(bh*0.09));
  ct.font=`bold ${sfs}px sans-serif`;ct.textAlign='center';ct.fillStyle='rgba(255,255,255,0.7)';
  ct.fillText(`${pSets} 局 : ${aiSets} 局`,cx,by+bh-pxS*4-sfs*0.5);

  // Tap to restart
  const blinkOn=Math.floor(t/18)%2===0;
  if(blinkOn){
    const rfs=Math.max(10,Math.round(bh*0.07));
    ct.font=`${rfs}px 'Courier New',monospace`;ct.textAlign='center';ct.fillStyle='rgba(255,220,80,0.9)';
    ct.fillText(isPlayer?'▶  TAP TO PLAY AGAIN  ◀':'▶  TRY AGAIN  ◀',cx,by+bh-pxS*4-sfs*2.2);
  }
}

function draw8BitBorder(bx,by,bw,bh,ps,c1,c2){
  // Alternating pixel blocks around perimeter
  const blockW=ps*2;
  ct.fillStyle=c1;ct.fillRect(bx,by,bw,blockW);ct.fillRect(bx,by+bh-blockW,bw,blockW);
  ct.fillRect(bx,by,blockW,bh);ct.fillRect(bx+bw-blockW,by,blockW,bh);
  // Corner accent squares
  ct.fillStyle=c2;
  [[bx,by],[bx+bw-blockW*2,by],[bx,by+bh-blockW*2],[bx+bw-blockW*2,by+bh-blockW*2]].forEach(([x,y])=>{
    ct.fillRect(x,y,blockW*2,blockW*2);
  });
}

function draw8BitLogoBar(lx,ly,lw,lh,t,cols){
  const ps=Math.max(2,Math.round(lh*0.08));
  // Pixel grid stripe background
  const sw=lw/cols.length;
  ct.save();
  ct.beginPath();ct.rect(lx,ly,lw,lh);ct.clip();
  for(let i=0;i<cols.length;i++){ct.fillStyle=cols[i];ct.fillRect(lx+sw*i,ly,sw,lh);}
  // Pixel scanlines
  ct.fillStyle='rgba(0,0,0,0.18)';
  for(let r=0;r<lh;r+=ps*2){ct.fillRect(lx,ly+r,lw,ps);}
  ct.restore();
  // Pixel border
  ct.strokeStyle='rgba(255,220,50,0.9)';ct.lineWidth=ps;
  ct.strokeRect(lx+ps/2,ly+ps/2,lw-ps,lh-ps);
  // LOVE PICKLEBALL 8-bit text
  const fs=Math.round(lh*0.42);
  ct.font=`900 ${fs}px 'Courier New',monospace`;
  ct.textAlign='center';ct.textBaseline='middle';
  ct.fillStyle='rgba(0,0,0,0.7)';ct.fillText('LOVE PICKLEBALL',lx+lw/2+2,ly+lh/2+2);
  const flashT=cols[Math.floor(t*0.5)%cols.length];
  ct.fillStyle='#fff';ct.fillText('LOVE PICKLEBALL',lx+lw/2,ly+lh/2);
  // Blinking cursor pixel
  if(Math.floor(t/8)%2===0){
    ct.fillStyle=flashT;ct.fillRect(lx+lw-fs*0.5,ly+lh/2-fs*0.35,fs*0.25,fs*0.6);
  }
}

function drawCursiveYouWin(cx,cy,totalW,t){
  // Draw cursive "you win !" using bezier paths
  const fade=Math.min(1,(t-30)/25);if(fade<=0)return;
  const drawProg=Math.min(1,(t-30)/55);
  ct.save();
  ct.globalAlpha=fade;
  const col=['#FF6B35','#F7931E','#FFCD00','#39B54A','#00AEEF','#8B5CF6','#EF4444'];
  const flashC=col[Math.floor(t*0.3)%col.length];
  const fh=Math.max(18,Math.round(totalW*0.14));
  ct.font=`italic ${fh}px Georgia,serif`;
  ct.textAlign='center';ct.textBaseline='middle';
  // Glow
  ct.shadowColor=flashC;ct.shadowBlur=10+5*Math.sin(t*0.2);
  ct.fillStyle=flashC;ct.fillText('you win !',cx+2,cy+2);
  ct.shadowBlur=0;ct.fillStyle='#fff';ct.fillText('you win !',cx,cy);

  // Animated underline squiggle
  const uw=totalW*0.72,ux=cx-uw/2;
  const progW=uw*drawProg;
  ct.strokeStyle=flashC;ct.lineWidth=Math.max(2,fh*0.08);ct.lineCap='round';
  ct.beginPath();
  const steps=Math.floor(progW/6);
  for(let i=0;i<=steps;i++){
    const xp=ux+i*(progW/steps);
    const yp=cy+fh*0.72+Math.sin(i*0.7)*fh*0.12;
    i===0?ct.moveTo(xp,yp):ct.lineTo(xp,yp);
  }
  ct.stroke();
  ct.restore();
}

function drawPaddle(p,isP){
  ct.save();
  const rx=7,pw=p.w,ph=p.h,x=p.x,y=p.y;
  ct.fillStyle=isP?'#5D4037':'#37474F';ct.fillRect(x-pw*0.1,isP?y+ph:y-ph*0.9,pw*0.2,ph*0.9);
  ct.beginPath();ct.roundRect(x-pw/2,y,pw,ph,rx);ct.fillStyle=isP?'#1565C0':'#B71C1C';ct.fill();
  ct.save();ct.beginPath();ct.roundRect(x-pw/2,y,pw,ph,rx);ct.clip();
  const cols=['#FF6B35','#F7931E','#FFCD00','#39B54A','#00AEEF','#8B5CF6','#EF4444'];
  ct.globalAlpha=0.68;const sw=pw/cols.length;const c2=isP?cols:[...cols].reverse();
  for(let i=0;i<c2.length;i++){ct.fillStyle=c2[i];ct.fillRect(x-pw/2+sw*i,y,sw,ph);}
  ct.globalAlpha=1;
  if(!isP){
    const cr=Math.min(pw,ph)*0.35,ir=cr*0.44;ct.fillStyle='rgba(255,255,255,0.65)';ct.beginPath();
    for(let i=0;i<10;i++){const a=(i*Math.PI/5)-Math.PI/2;const rr=i%2===0?cr:ir;i===0?ct.moveTo(x+Math.cos(a)*rr,y+ph/2+Math.sin(a)*rr):ct.lineTo(x+Math.cos(a)*rr,y+ph/2+Math.sin(a)*rr);}
    ct.closePath();ct.fill();
  }
  ct.restore();
  ct.strokeStyle=isP?'rgba(144,202,249,0.9)':'rgba(239,154,154,0.9)';ct.lineWidth=2;
  ct.beginPath();ct.roundRect(x-pw/2,y,pw,ph,rx);ct.stroke();
  ct.font=`bold ${Math.round(ph*0.75)}px sans-serif`;ct.textAlign='center';ct.textBaseline='middle';
  ct.fillStyle='rgba(255,255,255,0.95)';ct.fillText('S',x,y+ph/2);
  ct.restore();
}
function drawBall(bx,by,br){
  ct.save();ct.beginPath();ct.arc(bx,by,br,0,Math.PI*2);
  ct.fillStyle='#D4FF00';ct.fill();ct.strokeStyle='rgba(0,0,0,0.4)';ct.lineWidth=1.5;ct.stroke();
  const holes=[[0,-0.55],[0.48,-0.28],[0.48,0.28],[0,0.55],[-0.48,0.28],[-0.48,-0.28],[0,0]];
  ct.fillStyle='rgba(0,0,0,0.55)';
  for(const[hx,hy] of holes){ct.beginPath();ct.arc(bx+hx*br,by+hy*br,br*0.23,0,Math.PI*2);ct.fill();}
  ct.restore();
}

draw();updateUI();

/* ========== i18n LANGUAGE TOGGLE ========== */

function applyLang(){
  document.querySelectorAll('[data-i18n]').forEach(el=>{
    const key=el.getAttribute('data-i18n');
    el.textContent=t(key);
  });
  document.getElementById('btnlang').textContent=t('btnlang');
  // Always update smsg based on current game state
  if(state==='idle'||!running)setMsg(t('idle-msg'));
  else if(state==='serve'){
    if(serving==='player')setMsg(t('serve-player'));
    else setMsg(t('serve-ai'));
  }
  // Re-render log to update You/AI labels
  renderLog();
  // Re-run updateUI to refresh serving badge
  updateUI();
}

document.getElementById('btnlang').addEventListener('click',()=>{
  lang=lang==='zh'?'en':'zh';
  applyLang();
});
